spring.application.name=url-shorter-sb

server.port=${SERVER_PORT:8081}
server.forward-headers-strategy=framework

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/url_shortener}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=5s

app.base-url=${APP_BASE_URL:http://localhost:8080}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

app.jwt.secret=${JWT_SECRET:VGhpc0lzQVNlY3VyZUJhc2U2NEVuY29kZWRLZXlGb3JVUkxTaG9ydGVuZXJBcHAxMjM0NTY3ODkw}
app.jwt.access-token-expiration=PT15M
app.jwt.refresh-token-expiration=P7D

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

logging.level.org.springframework.security=INFO
